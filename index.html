<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наша Сказка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(rgba(10, 10, 26, 0.85), rgba(10, 10, 26, 0.9)),
                url('https://raw.githubusercontent.com/ififcloud/vbh/main/%D1%84%D0%BE%D0%BD.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            min-height: 100vh;
        }

        section {
            padding: 80px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 50px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
        }

        .characters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 40px;
            max-width: 1200px;
            width: 100%;
        }

        .locations-grid {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1400px;
            width: 100%;
        }

        .character-item, .location-item {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 215, 0, 0.4);
            border-radius: 20px;
            padding: 30px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .character-item:hover, .location-item:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-5px);
        }

        .character-item img {
            width: 160px;
            height: 160px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #ffd700;
            margin-bottom: 15px;
        }

        .location-item img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 15px;
            border: 3px solid #ffd700;
            margin-bottom: 15px;
        }

        .character-item p, .location-item p {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
        }

        /* 🟢 ЗЕЛЁНОЕ СВЕЧЕНИЕ - ПРОСТОЕ И РАБОЧЕЕ */
        .character-item.playing, .location-item.playing {
            border: 4px solid #00ff88 !important;
            box-shadow: 0 0 50px #00ff88, 0 0 100px #00ff88 !important;
            background: rgba(0, 255, 136, 0.3) !important;
            transform: scale(1.05) !important;
        }

        .character-item.playing img, .location-item.playing img {
            border: 5px solid #00ff88 !important;
            box-shadow: 0 0 40px #00ff88 !important;
        }

        .story-content {
            max-width: 900px;
            background: rgba(255, 255, 255, 0.08);
            padding: 60px 50px;
            border-radius: 25px;
            border: 3px solid rgba(255, 215, 0, 0.4);
            line-height: 2;
            font-size: 1.1rem;
            white-space: pre-wrap;
            backdrop-filter: blur(10px);
        }

        .music-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 30px;
            background: rgba(255, 215, 0, 0.25);
            border: 3px solid #ffd700;
            border-radius: 30px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .music-btn:hover {
            background: rgba(255, 215, 0, 0.4);
        }

        .music-btn.active {
            background: rgba(0, 255, 136, 0.3);
            border-color: #00ff88;
        }

        .music-btn.active .btn-icon {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .character-item img { width: 120px; height: 120px; }
            .music-btn .btn-text { display: none; }
        }

        @media (max-width: 480px) {
            .characters-grid { grid-template-columns: repeat(2, 1fr); }
            .locations-grid { flex-direction: column; }
            .location-item { min-width: 260px; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="https://raw.githubusercontent.com/ififcloud/vbh/main/action.mp3" type="audio/mpeg">
    </audio>

    <section class="characters">
        <h1>Персонажи</h1>
        <div class="characters-grid">
            <div class="character-item" data-sound="Элион">
                <img src="https://raw.githubusercontent.com/ififcloud/vbh/main/%D0%AD%D0%BB%D0%B8%D0%BE%D0%BD.png" alt="Элион">
                <p>Элион</p>
            </div>
            <div class="character-item" data-sound="Мира">
                <img src="https://raw.githubusercontent.com/ififcloud/vbh/main/%D0%9C%D0%B8%D1%80%D0%B0.png" alt="Мира">
                <p>Мира</p>
            </div>
            <div class="character-item" data-sound="Каэль">
                <img src="https://raw.githubusercontent.com/ififcloud/vbh/main/%D0%9A%D0%B0%D1%8D%D0%BB%D1%8C.jpg" alt="Каэль">
                <p>Каэль</p>
            </div>
            <div class="character-item" data-sound="Вектор">
                <img src="https://raw.githubusercontent.com/ififcloud/vbh/main/%D0%92%D0%B5%D0%BA%D1%82%D0%BE%D1%80.jpg" alt="Вектор">
                <p>Вектор</p>
            </div>
            <div class="character-item" data-sound="Нокс">
                <img src="https://raw.githubusercontent.com/ififcloud/vbh/main/%D0%9D%D0%BE%D0%BA%D1%81.jpeg" alt="Нокс">
                <p>Нокс</p>
            </div>
        </div>
    </section>

    <section class="locations">
        <h1>Локации</h1>
        <div class="locations-grid">
            <div class="location-item" data-sound="action">
                <img src="https://raw.githubusercontent.com/ififcloud/vbh/main/action.jpg" alt="Action">
                <p>Action</p>
            </div>
            <div class="location-item" data-sound="building">
                <img src="https://raw.githubusercontent.com/ififcloud/vbh/main/building.jpg" alt="Building">
                <p>Building</p>
            </div>
            <div class="location-item" data-sound="heart">
                <img src="https://raw.githubusercontent.com/ififcloud/vbh/main/heart.jpg" alt="Heart">
                <p>Heart</p>
            </div>
            <div class="location-item" data-sound="landscape">
                <img src="https://raw.githubusercontent.com/ififcloud/vbh/main/landscape.jpg" alt="Landscape">
                <p>Landscape</p>
            </div>
            <div class="location-item" data-sound="texture">
                <img src="https://raw.githubusercontent.com/ififcloud/vbh/main/texture.jpg" alt="Texture">
                <p>Texture</p>
            </div>
        </div>
    </section>

    <section class="story">
        <h1>Наша Сказка</h1>
        <div class="story-content" id="story-text">Загрузка...</div>
    </section>

    <button id="music-toggle" class="music-btn">
        <span class="btn-icon">🔇</span>
        <span class="btn-text">Музыка</span>
    </button>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const bgMusic = document.getElementById('bg-music');
            const musicToggle = document.getElementById('music-toggle');
            const storyText = document.getElementById('story-text');
            let currentAudio = null;
            let isMusicPlaying = false;
            let glowTimer = null;

            console.log('✅ Сайт загружен!');

            // КНОПКА МУЗЫКИ
            function updateButton() {
                if (!musicToggle) return;
                const icon = musicToggle.querySelector('.btn-icon');
                if (isMusicPlaying) {
                    musicToggle.classList.add('active');
                    icon.textContent = '🎵';
                } else {
                    musicToggle.classList.remove('active');
                    icon.textContent = '🔇';
                }
            }

            if (musicToggle) {
                musicToggle.addEventListener('click', function() {
                    if (!bgMusic) return;
                    if (isMusicPlaying) {
                        bgMusic.pause();
                        isMusicPlaying = false;
                    } else {
                        bgMusic.volume = 0.3;
                        bgMusic.play();
                        isMusicPlaying = true;
                    }
                    updateButton();
                });
            }

            document.addEventListener('click', function firstClick() {
                if (!isMusicPlaying && bgMusic) {
                    bgMusic.volume = 0.3;
                    bgMusic.play();
                    isMusicPlaying = true;
                    updateButton();
                }
                document.removeEventListener('click', firstClick);
            }, { once: true });

            // ЗВУКИ И СВЕЧЕНИЕ
            function playSound(soundName, element) {
                console.log('🎵 Клик:', soundName);

                // Убираем свечение со всех
                document.querySelectorAll('.playing').forEach(el => {
                    el.classList.remove('playing');
                });
                if (glowTimer) clearTimeout(glowTimer);

                // Останавливаем предыдущий звук
                if (currentAudio) {
                    currentAudio.pause();
                    currentAudio.currentTime = 0;
                }

                // Включаем ЗЕЛЁНОЕ СВЕЧЕНИЕ СРАЗУ
                element.classList.add('playing');
                console.log('✅ СВЕЧЕНИЕ ВКЛЮЧЕНО!');

                // Звук
                const url = 'https://raw.githubusercontent.com/ififcloud/vbh/main/' + encodeURIComponent(soundName) + '.mp3';
                currentAudio = new Audio(url);
                currentAudio.volume = 0.7;

                currentAudio.play().catch(function(err) {
                    console.log('⚠️ Звук не загрузился, но свечение работает!', err);
                });

                // Свечение горит МИНИМУМ 3 секунды
                glowTimer = setTimeout(function() {
                    element.classList.remove('playing');
                    console.log('⏹️ Свечение выключено');
                }, 3000);

                // Если звук закончился раньше - всё равно ждём 3 секунды
                currentAudio.addEventListener('ended', function() {
                    console.log('🎵 Звук закончился');
                });
            }

            // ПЕРСОНАЖИ
            document.querySelectorAll('.character-item').forEach(function(item) {
                item.addEventListener('click', function() {
                    const sound = this.getAttribute('data-sound');
                    if (sound) playSound(sound, this);
                });
            });

            // ЛОКАЦИИ
            document.querySelectorAll('.location-item').forEach(function(item) {
                item.addEventListener('click', function() {
                    const sound = this.getAttribute('data-sound');
                    if (sound) playSound(sound, this);
                });
            });

            // СКАЗКА
            fetch('https://raw.githubusercontent.com/ififcloud/vbh/main/01_Lore.txt')
                .then(r => r.text())
                .then(text => { storyText.textContent = text; })
                .catch(() => { storyText.textContent = 'Ошибка загрузки...'; });

            console.log('=================================');
            console.log('💚 КЛИКНИТЕ НА ПЕРСОНАЖА!');
            console.log('   Свечение будет гореть 3 секунды');
            console.log('=================================');
        });
    </script>

</body>
</html>
